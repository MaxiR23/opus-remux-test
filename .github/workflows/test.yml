name: Test Opus Remux

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Remux + Progressive ResourceLoader
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ffmpeg
        run: brew install ffmpeg

      - name: Swift version
        run: swift --version

      - name: Build
        run: swift build -c release

      - name: CLI test (demux + mux + afinfo + AVFoundation)
        run: swift run -c release OpusRemuxTest

      - name: Progressive ResourceLoader tests (AVPlayer + AVAssetResourceLoaderDelegate)
        run: swift test --filter ResourceLoaderTests -v

      - name: Upload CAF
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: remux-output
          path: /tmp/remux_test_output.caf
          if-no-files-found: ignore
