name: iOS Simulator Resource Loader Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  simulator-test:
    name: iOS Simulator
    runs-on: macos-15
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Xcode version
        run: xcodebuild -version

      - name: Available simulators
        run: xcrun simctl list devices available | grep -E "iPhone [0-9]" | head -10

      - name: Install ffmpeg
        run: brew install ffmpeg

      - name: Build & Test
        run: |
          SIMULATOR=$(xcrun simctl list devices available | grep "iPhone" | grep -v "unavailable" | tail -1 | sed 's/.*(\(.*\)).*/\1/')
          echo "Using simulator: $SIMULATOR"
          xcodebuild test \
            -project SimulatorTest.xcodeproj \
            -scheme ResourceLoaderTests \
            -destination "platform=iOS Simulator,id=$SIMULATOR" \
            -only-testing:ResourceLoaderTests \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty || xcodebuild test \
              -project SimulatorTest.xcodeproj \
              -scheme ResourceLoaderTests \
              -destination "platform=iOS Simulator,id=$SIMULATOR" \
              -only-testing:ResourceLoaderTests \
              CODE_SIGNING_ALLOWED=NO